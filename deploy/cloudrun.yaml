apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: rust-training-slides
  labels:
    cloud.googleapis.com/location: europe-north1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 30
      containers:
        - image: __IMAGE__
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
  traffic:
    - percent: 100
      latestRevision: true
